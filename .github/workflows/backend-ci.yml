name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend-build-test-lint:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fing
          POSTGRES_USER: fing
          POSTGRES_PASSWORD: fing
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U fing -d fing"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DB_URL: jdbc:postgresql://localhost:5432/fing
      DB_USERNAME: fing
      DB_PASSWORD: fing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, test, and verify
        run: mvn --batch-mode verify

      - name: Lint with Checkstyle
        run: mvn --batch-mode checkstyle:check
