services:
  postgres:
    image: postgres:16
    container_name: fing-postgres
    environment:
      POSTGRES_DB: fing
      POSTGRES_USER: fing
      POSTGRES_PASSWORD: fing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fing -d fing"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
